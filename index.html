document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

c6678;padding:16px 10px 7px\">Navigation<\u002Fdiv>\n    <nav style=\"display:flex;flex-direction:column;gap:2px\">\n      <sc-for list=\"{{ nav }}\" as=\"item\" hint-placeholder-count=\"7\">\n        <div onclick=\"{{ item.onClick }}\" style=\"cursor:pointer\">\n          <sc-if value=\"{{ item.isActive }}\" hint-placeholder-val=\"{{ item.isActive }}\">\n            <div style=\"display:flex;align-items:center;gap:11px;padding:9px 12px;border-radius:8px;font-size:13px;font-weight:600;background:#222d40;color:#fff\">\n              <span style=\"width:18px;text-align:center;font-size:14px;opacity:.9\">{{ item.icon }}<\u002Fspan>\n              <span>{{ item.label }}<\u002Fspan>\n            <\u002Fdiv>\n          <\u002Fsc-if>\n          <sc-if value=\"{{ item.inactive }}\" hint-placeholder-val=\"{{ item.inactive }}\">\n            <div style=\"display:flex;align-items:center;gap:11px;padding:9px 12px;border-radius:8px;font-size:13px;font-weight:500;color:#9aa4b2\">\n              <span style=\"width:18px;text-align:center;font-size:14px;opacity:.85\">{{ item.icon }}<\u002Fspan>\n              <span>{{ item.label }}<\u002Fspan>\n            <\u002Fdiv>\n          <\u002Fsc-if>\n        <\u002Fdiv>\n      <\u002Fsc-for>\n    <\u002Fnav>\n\n    <div style=\"margin-top:auto;display:flex;flex-direction:column;gap:10px\">\n      <div onclick=\"{{ onGoSources }}\" style=\"display:flex;align-items:center;gap:9px;padding:9px 12px;border-radius:8px;font-size:13px;color:#9aa4b2;cursor:pointer\">\n        <span style=\"width:18px;text-align:center;font-size:14px;opacity:.85\">⚙<\u002Fspan><span>Sources &amp; actualisations<\u002Fspan>\n      <\u002Fdiv>\n      <div onclick=\"{{ onPrint }}\" style=\"display:flex;align-items:center;gap:9px;padding:9px 12px;border-radius:8px;font-size:13px;color:#9aa4b2;cursor:pointer\">\n        <span style=\"width:18px;text-align:center;font-size:14px;opacity:.85\">🖨<\u002Fspan><span>Bulletin du jour (PDF)<\u002Fspan>\n      <\u002Fdiv>\n      <div style=\"background:#1c2433;border:1px solid #2a3344;border-radius:10px;padding:12px\">\n        <button onclick=\"{{ onRefresh }}\" disabled=\"{{ refreshDisabled }}\" style=\"width:100%;background:#2d6df0;color:#fff;border:none;border-radius:8px;padding:9px;font-size:12.5px;font-weight:600;cursor:pointer;font-family:inherit;display:flex;align-items:center;justify-content:center;gap:7px\">\n          <span>↻<\u002Fspan> {{ refreshLabel }}\n        <\u002Fbutton>\n        <div style=\"font-size:10.5px;color:#6b7585;margin-top:9px;text-align:center\">{{ lastUpdateLabel }}<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Faside>\n\n  <!-- ░░░░░ MAIN ░░░░░ -->\n  <main style=\"flex:1;min-width:0;display:flex;flex-direction:column;overflow:hidden;position:relative\">\n\n    <!-- topbar -->\n    <header style=\"height:64px;flex-shrink:0;background:#fff;border-bottom:1px solid #e6eaf0;display:flex;align-items:center;justify-content:space-between;padding:0 26px\">\n      <div>\n        <div style=\"font-size:17px;font-weight:700;letter-spacing:-.01em\">{{ pageTitle }}<\u002Fdiv>\n        <div style=\"font-size:11.5px;color:#79828f;margin-top:1px\">{{ subtitle }}<\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"display:flex;align-items:center;gap:18px\">\n        <div style=\"display:flex;align-items:center;gap:3px;background:#eef1f5;border:1px solid #e3e8ef;border-radius:9px;padding:3px\">\n          <button style=\"{{ scopeRegStyle }}\" onclick=\"{{ onScopeReg }}\">Régional<\u002Fbutton>\n          <button style=\"{{ scopeWorldStyle }}\" onclick=\"{{ onScopeWorld }}\">Mondial<\u002Fbutton>\n        <\u002Fdiv>\n        <div style=\"text-align:right\">\n          <div style=\"font-size:9.5px;text-transform:uppercase;letter-spacing:.07em;color:#9aa4b2\">Risque global<\u002Fdiv>\n          <div style=\"display:inline-flex;align-items:center;gap:6px;margin-top:3px;background:#fbe3e3;border:1px solid #e09a9a;color:#b32525;padding:3px 11px;border-radius:6px;font-size:12px;font-weight:700\">\n            <span style=\"width:7px;height:7px;border-radius:50%;background:#d44\">●<\u002Fspan> URGENCE\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fheader>\n\n    <div style=\"flex:1;overflow-y:auto;padding:24px 26px 40px\">\n\n      <!-- ═══ ÉPIDÉMIOLOGIE MONDIALE (page synthèse, sans carte) ═══ -->\n      <sc-if value=\"{{ isMondialPage }}\">\n      <div>\n        <!-- KPI ROW mondial -->\n        <div style=\"display:grid;grid-template-columns:repeat(auto-fit,minmax(210px,1fr));gap:16px;margin-bottom:22px\">\n          <div style=\"background:#fff;border:1px solid #e6eaf0;border-radius:12px;padding:17px 18px;box-shadow:0 1px 2px rgba(20,30,50,.04)\">\n            <div style=\"font-size:11.5px;color:#79828f;font-weight:500\">Pathogènes actifs (monde)<\u002Fdiv>\n            <div class=\"num\" style=\"font-size:30px;font-weight:800;letter-spacing:-.02em;margin-top:6px\">{{ globalActive }}<\u002Fdiv>\n            <div style=\"font-size:11px;color:#9aa4b2;margin-top:4px\">sur 12 suivis<\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"background:#fff;border:1px solid #e6eaf0;border-radius:12px;padding:17px 18px;box-shadow:0 1px 2px rgba(20,30,50,.04)\">\n            <div style=\"font-size:11.5px;color:#79828f;font-weight:500\">USPPI en cours<\u002Fdiv>\n            <div class=\"num\" style=\"font-size:30px;font-weight:800;letter-spacing:-.02em;margin-top:6px;color:#b32525\">2<\u002Fdiv>\n            <div style=\"font-size:11px;color:#9aa4b2;margin-top:4px\">Mpox · Ebola Bundibugyo<\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"background:#fff;border:1px solid #e6eaf0;border-radius:12px;padding:17px 18px;box-shadow:0 1px 2px rgba(20,30,50,.04)\">\n            <div style=\"font-size:11.5px;color:#79828f;font-weight:500\">Tendance dominante<\u002Fdiv>\n            <div style=\"font-size:21px;font-weight:800;letter-spacing:-.01em;margin-top:9px;color:#b32525\">↑ en hausse<\u002Fdiv>\n            <div style=\"font-size:11px;color:#9aa4b2;margin-top:5px\">arboviroses &amp; choléra<\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"background:#fff;border:1px solid #e6eaf0;border-radius:12px;padding:17px 18px;box-shadow:0 1px 2px rgba(20,30,50,.04)\">\n            <div style=\"font-size:11.5px;color:#79828f;font-weight:500\">Charge la plus lourde<\u002Fdiv>\n            <div style=\"font-size:21px;font-weight:800;letter-spacing:-.01em;margin-top:9px\">Dengue<\u002Fdiv>\n            <div style=\"font-size:11px;color:#9aa4b2;margin-top:5px\">&gt; 9 M de cas en 2026<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <div style=\"display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap;margin-bottom:14px\">\n          <div style=\"font-size:12.5px;color:#79828f\">Situation mondiale synthétique par pathogène · chiffres indicatifs, ordres de grandeur.<\u002Fdiv>\n          <div onclick=\"{{ onGoCarte }}\" style=\"font-size:12px;color:#2d6df0;font-weight:600;cursor:pointer;background:#eef4ff;border:1px solid #d4e2fb;padding:6px 12px;border-radius:8px\">◍ Voir la carte mondiale →<\u002Fdiv>\n        <\u002Fdiv>\n\n        <section style=\"background:#fff;border:1px solid #e6eaf0;border-radius:14px;box-shadow:0 1px 2px rgba(20,30,50,.04);overflow-x:auto\">\n          <div style=\"min-width:880px\">\n            <div style=\"display:grid;grid-template-columns:200px 280px 80px 120px 100px 1fr;background:#fafbfc;border-bottom:1px solid #eef1f5\">\n              <div style=\"padding:11px 16px;text-align:left;font-size:11px;font-weight:600;color:#79828f\">Pathogène<\u002Fdiv>\n              <div style=\"padding:11px 12px;text-align:left;font-size:11px;font-weight:600;color:#79828f\">Régions touchées<\u002Fdiv>\n              <div style=\"padding:11px 12px;text-align:right;font-size:11px;font-weight:600;color:#79828f\">Pays<\u002Fdiv>\n              <div style=\"padding:11px 12px;text-align:right;font-size:11px;font-weight:600;color:#b32525;white-space:nowrap\">Cas (monde)<\u002Fdiv>\n              <div style=\"padding:11px 12px;text-align:right;font-size:11px;font-weight:600;color:#7a1f1f;white-space:nowrap\">Décès<\u002Fdiv>\n              <div style=\"padding:11px 12px;text-align:left;font-size:11px;font-weight:600;color:#79828f\">Tendance<\u002Fdiv>\n            <\u002Fdiv>\n            <sc-for list=\"{{ globalRows }}\" as=\"g\" hint-placeholder-count=\"11\">\n              <div style=\"display:grid;grid-template-columns:200px 280px 80px 120px 100px 1fr;border-bottom:1px solid #f1f4f8\">\n                <div style=\"padding:12px 16px\">\n                  <div style=\"font-size:13.5px;font-weight:700;color:#1b2330;margin-bottom:4px\">{{ g.name }}<\u002Fdiv>\n                  <span style=\"{{ g.badgeStyle }}\">{{ g.badgeLabel }}<\u002Fspan>\n                <\u002Fdiv>\n                <div style=\"padding:12px\">\n                  <div style=\"font-size:12.5px;color:#3c4757;line-height:1.45\">{{ g.regions }}<\u002Fdiv>\n                  <div style=\"font-size:11px;color:#9aa4b2;line-height:1.45;margin-top:4px\">{{ g.note }}<\u002Fdiv>\n                <\u002Fdiv>\n                <div style=\"padding:12px;text-align:right;font-variant-numeric:tabular-nums;font-size:13px;color:#46505f\">{{ g.countries }}<\u002Fdiv>\n                <div style=\"padding:12px;text-align:right;font-variant-numeric:tabular-nums;font-size:13px;font-weight:600;color:#b32525;white-space:nowrap\">{{ g.cas }}<\u002Fdiv>\n                <div style=\"padding:12px;text-align:right;font-variant-numeric:tabular-nums;font-size:13px;color:#7a1f1f;white-space:nowrap\">{{ g.dec }}<\u002Fdiv>\n                <div style=\"padding:12px\"><span style=\"{{ g.trendStyle }}\">{{ g.trendLabel }}<\u002Fspan><\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n        <\u002Fsection>\n        <div style=\"margin-top:12px;font-size:11px;color:#9aa4b2;line-height:1.5\">Sources de référence : OMS (Disease Outbreak News, tableaux de bord), ECDC, Africa CDC, OPS. Bascule « Régional » pour revenir au périmètre Océan Indien / Afrique de l'Est.<\u002Fdiv>\n      <\u002Fdiv>\n      <\u002Fsc-if>\n\n      <!-- ═══ CARTE MONDIALE (onglet Carte en mode Mondial) ═══ -->\n      <sc-if value=\"{{ isMondialCarte }}\">\n      <div>\n        <div style=\"display:flex;align-items:center;gap:12px;margin-bottom:16px;flex-wrap:wrap\">\n          <label style=\"font-size:13px;font-weight:600;color:#46505f\">Pathogène<\u002Flabel>\n          <select value=\"{{ mapPatho }}\" onchange=\"{{ onMapChange }}\" style=\"font-family:inherit;font-size:13px;padding:8px 12px;border:1px solid #d7dde5;border-radius:9px;background:#fff;color:#1b2330;min-width:230px;cursor:pointer\">\n            <sc-for list=\"{{ mapOptions }}\" as=\"o\" hint-placeholder-count=\"11\">\n              <option value=\"{{ o.id }}\">{{ o.name }}<\u002Foption>\n            <\u002Fsc-for>\n          <\u002Fselect>\n          <div style=\"font-size:12px;color:#9aa4b2;margin-left:auto\">{{ mapName }} · cliquez un pays · molette pour zoomer<\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"background:#fff;border:1px solid #e6eaf0;border-radius:14px;box-shadow:0 1px 2px rgba(20,30,50,.04);overflow:hidden\">\n          <div id=\"reb-map-world\" style=\"position:relative;height:560px;background:radial-gradient(120% 120% at 60% 25%, #eef5fb 0%, #e3eef7 60%, #dbe8f3 100%)\">\n            <div class=\"reb-map-loading\" style=\"position:absolute;inset:0;display:flex;align-items:center;justify-content:center;color:#9aa4b2;font-size:12px\">Chargement de la carte…<\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"display:flex;gap:16px;flex-wrap:wrap;padding:13px 18px;border-top:1px solid #eef1f5;background:#fafbfc\">\n            <div style=\"display:flex;align-items:center;gap:6px\"><span style=\"width:13px;height:13px;border-radius:4px;background:#fbe3e3;border:1.5px solid #e09a9a\"><\u002Fspan><span style=\"font-size:11px;color:#79828f\">Foyer actif / forte circulation<\u002Fspan><\u002Fdiv>\n            <div style=\"display:flex;align-items:center;gap:6px\"><span style=\"width:13px;height:13px;border-radius:4px;background:#fce8d8;border:1.5px solid #e6ac7e\"><\u002Fspan><span style=\"font-size:11px;color:#79828f\">Circulation modérée<\u002Fspan><\u002Fdiv>\n            <div style=\"display:flex;align-items:center;gap:6px\"><span style=\"width:13px;height:13px;border-radius:4px;background:#fdf3d6;border:1.5px solid #e3c873\"><\u002Fspan><span style=\"font-size:11px;color:#79828f\">Endémique / circulation faible<\u002Fspan><\u002Fdiv>\n            <div style=\"display:flex;align-items:center;gap:6px\"><span style=\"width:14px;height:14px;border-radius:50%;border:1.6px solid #d8a72b;display:flex;align-items:center;justify-content:center\"><span style=\"width:4px;height:4px;border-radius:50%;background:#d8a72b\"><\u002Fspan><\u002Fspan><span style=\"font-size:11px;color:#79828f\">Cas sporadique / importé<\u002Fspan><\u002Fdiv>\n            <div style=\"font-size:11px;color:#aab2bf;margin-left:auto;align-self:center\">Fond Natural Earth · répartition indicative<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <\u002Fsc-if>\n\n      <!-- ═══ ACCUEIL ═══ -->\n      <sc-if value=\"{{ isAccueil }}\" hint-placeholder-val=\"{{ true }}\">\n      <div>\n        <!-- KPI ROW -->\n        <div style=\"display:grid;grid-template-columns:repeat(auto-fit,minmax(210px,1fr));gap:16px;margin-bottom:22px\">\n          <div style=\"background:#fff;border:1px solid #e6eaf0;border-radius:12px;padding:17px 18px;box-shadow:0 1px 2px rgba(20,30,50,.04)\">\n            <div style=\"font-size:11.5px;color:#79828f;font-weight:500\">Foyers actifs<\u002Fdiv>\n            <div class=\"num\" style=\"font-size:30px;font-weight:800;letter-spacing:-.02em;margin-top:6px\">4<\u002Fdiv>\n            <div style=\"font-size:11px;color:#9aa4b2;margin-top:4px\">RDC · Ouganda · Madagascar · Comores<\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"background:#fff;border:1px solid #e6eaf0;border-radius:12px;padding:17px 18px;box-shadow:0 1px 2px rgba(20,30,50,.04)\">\n            <div style=\"font-size:11.5px;color:#79828f;font-weight:500\">Décès confirmés<\u002Fdiv>\n            <div class=\"num\" style=\"font-size:30px;font-weight:800;letter-spacing:-.02em;margin-top:6px;color:#b32525\">319<\u002Fdiv>\n            <div style=\"font-size:11px;color:#9aa4b2;margin-top:4px\">létalité variable selon agent<\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"background:#fff;border:1px solid #e6eaf0;border-radius:12px;padding:17px 18px;box-shadow:0 1px 2px rgba(20,30,50,.04)\">\n            <div style=\"font-size:11.5px;color:#79828f;font-weight:500\">Pathogènes en alerte<\u002Fdiv>\n            <div class=\"num\" style=\"font-size:30px;font-weight:800;letter-spacing:-.02em;margin-top:6px\">7<\u002Fdiv>\n            <div style=\"font-size:11px;color:#9aa4b2;margin-top:4px\">sur 12 sous surveillance<\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"background:#fff;border:1px solid #e6eaf0;border-radius:12px;padding:17px 18px;box-shadow:0 1px 2px rgba(20,30,50,.04)\">\n            <div style=\"font-size:11.5px;color:#79828f;font-weight:500\">Niveau le plus élevé<\u002Fdiv>\n            <div style=\"font-size:21px;font-weight:800;letter-spacing:-.01em;margin-top:9px;color:#b32525\">Urgence<\u002Fdiv>\n            <div style=\"font-size:11px;color:#9aa4b2;margin-top:5px\">Ebola Bundibugyo · RDC<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <!-- TWO COLUMNS -->\n        <div style=\"display:grid;grid-template-columns:1.55fr 1fr;gap:18px;align-items:start\">\n\n          <!-- LEFT: pathogènes en alerte -->\n          <section style=\"background:#fff;border:1px solid #e6eaf0;border-radius:14px;box-shadow:0 1px 2px rgba(20,30,50,.04);overflow:hidden\">\n            <div style=\"display:flex;align-items:center;justify-content:space-between;padding:15px 18px;border-bottom:1px solid #eef1f5\">\n              <div style=\"font-size:14px;font-weight:700\">Pathogènes en alerte<\u002Fdiv>\n              <div style=\"font-size:11.5px;color:#9aa4b2\">classés par niveau<\u002Fdiv>\n            <\u002Fdiv>\n            <div style=\"padding:8px\">\n              <sc-for list=\"{{ alerts }}\" as=\"a\" hint-placeholder-count=\"4\">\n                <div style=\"padding:13px 12px;border-radius:10px;display:flex;flex-direction:column;gap:9px;border-bottom:1px solid #f1f4f8\">\n                  <div style=\"display:flex;align-items:flex-start;justify-content:space-between;gap:10px\">\n                    <div>\n                      <div style=\"font-size:14px;font-weight:700;letter-spacing:-.01em\">{{ a.name }}<\u002Fdiv>\n                      <div style=\"font-size:11px;color:#8a93a1;margin-top:1px\">{{ a.group }}<\u002Fdiv>\n                    <\u002Fdiv>\n                    <span style=\"{{ a.badgeStyle }}\">{{ a.badgeLabel }}<\u002Fspan>\n                  <\u002Fdiv>\n                  <div style=\"font-size:11px;color:#79828f;background:#f6f8fa;border:1px solid #eef1f5;border-radius:6px;padding:5px 9px;display:inline-block;align-self:flex-start\"><span style=\"color:#9aa4b2\">Période :<\u002Fspan> {{ a.period }}<\u002Fdiv>\n                  <div style=\"display:flex;flex-wrap:wrap;gap:7px\">\n                    <sc-for list=\"{{ a.zones }}\" as=\"z\" hint-placeholder-count=\"2\">\n                      <div style=\"display:flex;align-items:center;gap:7px;background:#f6f8fa;border:1px solid #eaeef3;border-radius:7px;padding:5px 9px\">\n                        <span style=\"width:7px;height:7px;border-radius:50%;background:{{ z.dot }}\"><\u002Fspan>\n                        <span style=\"font-size:12px;font-weight:600\">{{ z.zone }}<\u002Fspan>\n                        <span class=\"num\" style=\"font-size:11px;color:#79828f\">{{ z.stat }}<\u002Fspan>\n                      <\u002Fdiv>\n                    <\u002Fsc-for>\n                  <\u002Fdiv>\n                <\u002Fdiv>\n              <\u002Fsc-for>\n            <\u002Fdiv>\n          <\u002Fsection>\n\n          <!-- RIGHT: fil de veille -->\n          <section style=\"background:#fff;border:1px solid #e6eaf0;border-radius:14px;box-shadow:0 1px 2px rgba(20,30,50,.04);overflow:hidden\">\n            <div style=\"display:flex;align-items:center;justify-content:space-between;padding:15px 18px;border-bottom:1px solid #eef1f5\">\n              <div style=\"font-size:14px;font-weight:700\">Fil de veille<\u002Fdiv>\n              <div style=\"font-size:11px;color:#2d6df0;font-weight:600;cursor:pointer\">Tout voir<\u002Fdiv>\n            <\u002Fdiv>\n            <div style=\"padding:6px 14px 12px\">\n              <sc-for list=\"{{ journal }}\" as=\"j\" hint-placeholder-count=\"3\">\n                <div style=\"padding:13px 4px;border-bottom:1px solid #f1f4f8;border-left:3px solid {{ j.dot }};padding-left:13px;margin:2px 0\">\n                  <div style=\"display:flex;align-items:center;gap:8px;margin-bottom:5px\">\n                    <span style=\"font-size:11px;font-weight:700;color:#1b2330\">{{ j.path }}<\u002Fspan>\n                    <span style=\"font-size:10px;color:#9aa4b2\">{{ j.meta }}<\u002Fspan>\n                  <\u002Fdiv>\n                  <div style=\"font-size:12px;line-height:1.5;color:#4a5360\">{{ j.text }}<\u002Fdiv>\n                <\u002Fdiv>\n              <\u002Fsc-for>\n              <div style=\"text-align:center;padding:12px 0 4px\">\n                <span style=\"font-size:12px;color:#9aa4b2\">+ saisie manuelle d'une note<\u002Fspan>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fsection>\n        <\u002Fdiv>\n\n        <!-- CHART -->\n        <section style=\"background:#fff;border:1px solid #e6eaf0;border-radius:14px;box-shadow:0 1px 2px rgba(20,30,50,.04);margin-top:18px;overflow:hidden\">\n          <div style=\"display:flex;align-items:center;justify-content:space-between;padding:15px 18px;border-bottom:1px solid #eef1f5\">\n            <div>\n              <div style=\"font-size:14px;font-weight:700\">Ebola Bundibugyo — courbe épidémique 2026<\u002Fdiv>\n              <div style=\"font-size:11px;color:#8a93a1;margin-top:2px\">Cas confirmés cumulés · USPPI déclarée le 17/05/2026<\u002Fdiv>\n            <\u002Fdiv>\n            <div style=\"display:flex;gap:16px;align-items:center\">\n              <div style=\"display:flex;align-items:center;gap:6px\"><span style=\"width:12px;height:3px;background:#d4453f;border-radius:2px\"><\u002Fspan><span style=\"font-size:11px;color:#79828f\">RDC<\u002Fspan><\u002Fdiv>\n              <div style=\"display:flex;align-items:center;gap:6px\"><span style=\"width:12px;height:3px;background:#e89a3c;border-radius:2px\"><\u002Fspan><span style=\"font-size:11px;color:#79828f\">Ouganda<\u002Fspan><\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"padding:18px 20px 10px\">\n            <svg viewBox=\"0 0 600 200\" style=\"width:100%;height:auto;display:block\" data-om-raster=\"\">\n              <line x1=\"40\" y1=\"170\" x2=\"585\" y2=\"170\" stroke=\"#e6eaf0\" stroke-width=\"1\"><\u002Fline>\n              <line x1=\"40\" y1=\"95\" x2=\"585\" y2=\"95\" stroke=\"#f0f3f7\" stroke-width=\"1\"><\u002Fline>\n              <line x1=\"40\" y1=\"20\" x2=\"585\" y2=\"20\" stroke=\"#f0f3f7\" stroke-width=\"1\"><\u002Fline>\n              <text x=\"34\" y=\"173\" text-anchor=\"end\" font-size=\"9\" fill=\"#9aa4b2\" font-family=\"Public Sans\">0<\u002Ftext>\n              <text x=\"34\" y=\"98\" text-anchor=\"end\" font-size=\"9\" fill=\"#9aa4b2\" font-family=\"Public Sans\">600<\u002Ftext>\n              <text x=\"34\" y=\"23\" text-anchor=\"end\" font-size=\"9\" fill=\"#9aa4b2\" font-family=\"Public Sans\">1200<\u002Ftext>\n              <path d=\"M40,170 L40,169.0 L176,141.9 L312,124.6 L448,65.4 L584,25.6 L584,170 Z\" fill=\"#d4453f\" fill-opacity=\"0.08\"><\u002Fpath>\n              <polyline points=\"40,169.0 176,141.9 312,124.6 448,65.4 584,25.6\" fill=\"none\" stroke=\"#d4453f\" stroke-width=\"2.5\" stroke-linejoin=\"round\" stroke-linecap=\"round\"><\u002Fpolyline>\n              <polyline points=\"40,169.75 176,168.9 312,168.1 448,167.6 584,167.6\" fill=\"none\" stroke=\"#e89a3c\" stroke-width=\"2\" stroke-linejoin=\"round\" stroke-linecap=\"round\"><\u002Fpolyline>\n              <g fill=\"#d4453f\"><circle cx=\"40\" cy=\"169.0\" r=\"3\"><\u002Fcircle><circle cx=\"176\" cy=\"141.9\" r=\"3\"><\u002Fcircle><circle cx=\"312\" cy=\"124.6\" r=\"3\"><\u002Fcircle><circle cx=\"448\" cy=\"65.4\" r=\"3\"><\u002Fcircle><circle cx=\"584\" cy=\"25.6\" r=\"3.5\"><\u002Fcircle><\u002Fg>\n              <text x=\"584\" y=\"18\" text-anchor=\"end\" font-size=\"10\" font-weight=\"700\" fill=\"#d4453f\" font-family=\"Public Sans\">1 155<\u002Ftext>\n              <text x=\"40\" y=\"190\" text-anchor=\"middle\" font-size=\"9\" fill=\"#9aa4b2\" font-family=\"Public Sans\">15/05<\u002Ftext>\n              <text x=\"176\" y=\"190\" text-anchor=\"middle\" font-size=\"9\" fill=\"#9aa4b2\" font-family=\"Public Sans\">29/05<\u002Ftext>\n              <text x=\"312\" y=\"190\" text-anchor=\"middle\" font-size=\"9\" fill=\"#9aa4b2\" font-family=\"Public Sans\">02/06<\u002Ftext>\n              <text x=\"448\" y=\"190\" text-anchor=\"middle\" font-size=\"9\" fill=\"#9aa4b2\" font-family=\"Public Sans\">15/06<\u002Ftext>\n              <text x=\"584\" y=\"190\" text-anchor=\"middle\" font-size=\"9\" fill=\"#9aa4b2\" font-family=\"Public Sans\">24/06<\u002Ftext>\n            <\u002Fsvg>\n          <\u002Fdiv>\n        <\u002Fsection>\n      <\u002Fdiv>\n      <\u002Fsc-if>\n\n      <!-- ═══ SYNTHÈSE ═══ -->\n      <sc-if value=\"{{ isSynthese }}\">\n      <div>\n        <div style=\"display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px;margin-bottom:18px\">\n          <div style=\"font-size:12.5px;color:#79828f\">Tableau de synthèse épidémiologique · un bloc par pathogène actif<\u002Fdiv>\n          <div style=\"display:flex;align-items:center;gap:10px;flex-wrap:wrap\">\n            <div style=\"position:relative;display:flex;align-items:center\">\n              <span style=\"position:absolute;left:11px;font-size:13px;color:#aab2bf;pointer-events:none\">⌕<\u002Fspan>\n              <input value=\"{{ sq }}\" oninput=\"{{ onSq }}\" placeholder=\"Filtrer…\" style=\"font-family:inherit;font-size:13px;padding:8px 12px 8px 30px;border:1px solid #d7dde5;border-radius:9px;background:#fff;color:#1b2330;width:170px;outline:none\">\n            <\u002Fdiv>\n            <div style=\"font-size:11px;color:#79828f;background:#fff;border:1px solid #e6eaf0;padding:5px 10px;border-radius:7px\"><span style=\"color:#9aa4b2\">NA<\u002Fspan> = non disponible dans les sources<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <sc-if value=\"{{ synthEmpty }}\">\n          <div style=\"background:#fff;border:1px dashed #d4dae2;border-radius:12px;padding:40px;text-align:center;color:#9aa4b2;font-size:13px\">Aucun pathogène ne correspond à votre filtre.<\u002Fdiv>\n        <\u002Fsc-if>\n\n        <sc-for list=\"{{ synth }}\" as=\"b\" hint-placeholder-count=\"3\">\n          <section style=\"background:#fff;border:1px solid #e6eaf0;border-radius:14px;box-shadow:0 1px 2px rgba(20,30,50,.04);overflow:hidden;margin-bottom:18px\">\n            <div style=\"display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;padding:14px 18px;border-bottom:1px solid #eef1f5\">\n              <div style=\"display:flex;align-items:center;gap:11px\">\n                <span style=\"font-size:15px;font-weight:700;letter-spacing:-.01em\">{{ b.name }}<\u002Fspan>\n                <span style=\"{{ b.badgeStyle }}\">{{ b.badgeLabel }}<\u002Fspan>\n                <span style=\"{{ b.freshPillStyle }}\"><span style=\"width:7px;height:7px;border-radius:50%;background:{{ b.freshDot }}\"><\u002Fspan>{{ b.freshLabel }}<\u002Fspan>\n              <\u002Fdiv>\n              <div style=\"font-size:11px;color:#9aa4b2\">{{ b.meta }}<\u002Fdiv>\n            <\u002Fdiv>\n            <div style=\"font-size:13px\">\n              <div style=\"display:grid;grid-template-columns:1fr 130px 130px 130px;background:#fafbfc;border-bottom:1px solid #eef1f5\">\n                <div style=\"padding:9px 18px;text-align:left;font-size:11px;font-weight:600;color:#79828f\">Zone<\u002Fdiv>\n                <div style=\"padding:9px 12px;text-align:right;font-size:11px;font-weight:600;color:#b32525;white-space:nowrap\">Cas confirmés<\u002Fdiv>\n                <div style=\"padding:9px 12px;text-align:right;font-size:11px;font-weight:600;color:#7a1f1f;white-space:nowrap\">Décès confirmés<\u002Fdiv>\n                <div style=\"padding:9px 18px 9px 12px;text-align:right;font-size:11px;font-weight:600;color:#8a6312;white-space:nowrap\">Cas suspects<\u002Fdiv>\n              <\u002Fdiv>\n              <sc-for list=\"{{ b.rows }}\" as=\"r\" hint-placeholder-count=\"2\">\n                <div style=\"display:grid;grid-template-columns:1fr 130px 130px 130px;{{ r.rowStyle }}\">\n                  <div style=\"padding:9px 18px;text-align:left;color:#1b2330\">{{ r.zone }}<\u002Fdiv>\n                  <div style=\"{{ r.confStyle }}\">{{ r.conf }}<\u002Fdiv>\n                  <div style=\"{{ r.decStyle }}\">{{ r.dec }}<\u002Fdiv>\n                  <div style=\"{{ r.suspStyle }};padding-right:18px\">{{ r.susp }}<\u002Fdiv>\n                <\u002Fdiv>\n              <\u002Fsc-for>\n            <\u002Fdiv>\n            <sc-if value=\"{{ b.hasCfr }}\" hint-placeholder-val=\"{{ b.hasCfr }}\">\n              <div style=\"padding:10px 18px;background:#fafbfc;border-top:1px solid #eef1f5;font-size:12px;color:#4a5360\">\n                <span style=\"font-weight:600\">Létalité observée (CFR) :<\u002Fspan> {{ b.cfr }}\n              <\u002Fdiv>\n            <\u002Fs :hidden\">\n          <div style=\"padding:14px 16px;border-bottom:1px solid #eef1f5;font-size:14px;font-weight:700\">Nouvelle entrée<\u002Fdiv>\n          <div style=\"padding:14px 16px;display:flex;flex-direction:column;gap:10px\">\n            <div style=\"font-size:11px;font-weight:600;color:#79828f\">Pathogène<\u002Fdiv>\n            <div style=\"font-size:13px;padding:9px 11px;border:1px solid #d7dde5;border-radius:9px;background:#fff;color:#46505f;display:flex;justify-content:space-between\"><span>Sélectionner…<\u002Fspan><span style=\"color:#aab2bf\">▾<\u002Fspan><\u002Fdiv>\n            <div style=\"font-size:11px;font-weight:600;color:#79828f;margin-top:2px\">Niveau<\u002Fdiv>\n            <div style=\"font-size:13px;padding:9px 11px;border:1px solid #d7dde5;border-radius:9px;background:#fff;color:#46505f;display:flex;justify-content:space-between\"><span>Veille renforcée<\u002Fspan><span style=\"color:#aab2bf\">▾<\u002Fspan><\u002Fdiv>\n            <div style=\"font-size:11px;font-weight:600;color:#79828f;margin-top:2px\">Observation<\u002Fdiv>\n            <div style=\"min-height:88px;font-size:13px;padding:10px 11px;border:1px solid #d7dde5;border-radius:9px;background:#fff;color:#aab2bf;line-height:1.5\">Observation clinique, mise à jour épidémiologique…<\u002Fdiv>\n            <button style=\"margin-top:4px;background:#141a26;color:#fff;border:none;border-radius:9px;padding:11px;font-size:13px;font-weight:600;font-family:inherit;cursor:pointer\">Enregistrer l'entrée<\u002Fbutton>\n          <\u002Fdiv>\n        <\u002Fsection>\n        <section style=\"display:flex;flex-direction:column;gap:10px\">\n          <sc-for list=\"{{ journalFull }}\" as=\"j\" hint-placeholder-count=\"3\">\n            <div style=\"background:#fff;border:1px solid #e6eaf0;border-radius:12px;box-shadow:0 1px 2px rgba(20,30,50,.04);padding:14px 16px\">\n              <div style=\"display:flex;align-items:center;gap:9px;margin-bottom:7px;flex-wrap:wrap\">\n                <span style=\"{{ j.badgeStyle }}\">{{ j.badgeLabel }}<\u002Fspan>\n                <span style=\"font-size:13px;font-weight:700;color:#1b2330\">{{ j.path }}<\u002Fspan>\n                <span style=\"font-size:11px;color:#9aa4b2;margin-left:auto\">{{ j.meta }}<\u002Fspan>\n              <\u002Fdiv>\n              <div style=\"font-size:13px;color:#3c4757;line-height:1.55\">{{ j.text }}<\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fsection>\n      <\u002Fdiv>\n      <\u002Fsc-if>\n\n      <!-- ═══ SOURCES & ACTUALISATIONS ═══ -->\n      <sc-if value=\"{{ isSources }}\">\n      <div>\n        <div style=\"display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:16px;margin-bottom:22px\">\n          <div style=\"background:#fff;border:1px solid #e6eaf0;border-radius:12px;padding:17px 18px;box-shadow:0 1px 2px rgba(20,30,50,.04)\">\n            <div style=\"font-size:11.5px;color:#79828f;font-weight:500\">Dernière actualisation<\u002Fdiv>\n            <div style=\"font-size:21px;font-weight:800;letter-spacing:-.01em;margin-top:9px\">28/06 · 06:00<\u002Fdiv>\n            <div style=\"font-size:11px;color:#9aa4b2;margin-top:5px\">automatique · aujourd'hui<\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"background:#fff;border:1px solid #e6eaf0;border-radius:12px;padding:17px 18px;box-shadow:0 1px 2px rgba(20,30,50,.04)\">\n            <div style=\"font-size:11.5px;color:#79828f;font-weight:500\">Cadence<\u002Fdiv>\n            <div style=\"font-size:21px;font-weight:800;letter-spacing:-.01em;margin-top:9px\">1×/jour<\u002Fdiv>\n            <div style=\"font-size:11px;color:#9aa4b2;margin-top:5px\">automatique (5 sources) · ↻ ne relit que la dernière publication<\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"background:#fff;border:1px solid #e6eaf0;border-radius:12px;padding:17px 18px;box-shadow:0 1px 2px rgba(20,30,50,.04)\">\n            <div style=\"font-size:11.5px;color:#79828f;font-weight:500\">Sources suivies<\u002Fdiv>\n            <div class=\"num\" style=\"font-size:21px;font-weight:800;letter-spacing:-.01em;margin-top:9px\">9<\u002Fdiv>\n            <div style=\"font-size:11px;color:#9aa4b2;margin-top:5px\">5 automatiques · 4 manuelles<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <div style=\"display:grid;grid-template-columns:1.3fr 1fr;gap:18px;align-items:start\">\n          <!-- Sources -->\n          <section style=\"background:#fff;border:1px solid #e6eaf0;border-radius:14px;box-shadow:0 1px 2px rgba(20,30,50,.04);overflow:hidden\">\n            <div style=\"padding:15px 18px;border-bottom:1px solid #eef1f5;font-size:14px;font-weight:700\">Sources de référence<\u002Fdiv>\n            <div>\n              <sc-for list=\"{{ sources }}\" as=\"s\" hint-placeholder-count=\"8\">\n                <div style=\"display:flex;align-items:center;justify-content:space-between;gap:12px;padding:13px 18px;border-bottom:1px solid #f4f6f9\">\n                  <div style=\"min-width:0\">\n                    <div style=\"display:flex;align-items:center;gap:7px;flex-wrap:wrap\">\n                      <span style=\"font-size:13px;font-weight:600;color:#1b2330\">{{ s.name }}<\u002Fspan>\n                      <span style=\"{{ s.kindTagStyle }};font-size:9px;font-weight:700;padding:1px 6px;border-radius:4px\">{{ s.kindTagLabel }}<\u002Fspan>\n                    <\u002Fdiv>\n                    <div style=\"font-size:11px;color:#8a93a1;margin-top:2px\">{{ s.scope }}<\u002Fdiv>\n                  <\u002Fdiv>\n                  <span style=\"{{ s.freshPillStyle }}\"><span style=\"width:7px;height:7px;border-radius:50%;background:{{ s.freshDot }}\"><\u002Fspan>{{ s.freshLabel }}<\u002Fspan>\n                <\u002Fdiv>\n              <\u002Fsc-for>\n            <\u002Fdiv>\n            <div style=\"padding:11px 18px;background:#fafbfc;border-top:1px solid #eef1f5;font-size:11px;color:#9aa4b2;line-height:1.5\">Les chiffres affichés dans l'outil renvoient toujours à l'une de ces sources, avec la date du bilan. Aucune donnée n'est inventée.<\u002Fdiv>\n          <\u002Fsection>\n\n          <!-- Journal d'actualisation -->\n          <section style=\"background:#fff;border:1px solid #e6eaf0;border-radius:14px;box-shadow:0 1px 2px rgba(20,30,50,.04);overflow:hidden\">\n            <div style=\"padding:15px 18px;border-bottom:1px solid #eef1f5;font-size:14px;font-weight:700\">Journal d'actualisation<\u002Fdiv>\n            <div style=\"padding:6px 18px 14px\">\n              <sc-for list=\"{{ updates }}\" as=\"u\" hint-placeholder-count=\"4\">\n                <div style=\"display:flex;gap:11px;padding:12px 0;border-bottom:1px solid #f4f6f9\">\n                  <span style=\"width:8px;height:8px;border-radius:50%;background:{{ u.dot }};margin-top:5px;flex-shrink:0\"><\u002Fspan>\n                  <div style=\"min-width:0\">\n                    <div style=\"display:flex;align-items:center;gap:7px;margin-bottom:3px;flex-wrap:wrap\">\n                      <span style=\"font-size:11px;font-weight:700;color:#1b2330\">{{ u.date }}<\u002Fspan>\n                      <span style=\"{{ u.tagStyle }};font-size:9px;font-weight:700;padding:1px 6px;border-radius:4px\">{{ u.tagLabel }}<\u002Fspan>\n                    <\u002Fdiv>\n                    <div style=\"font-size:12px;color:#3c4757;line-height:1.45\">{{ u.what }}<\u002Fdiv>\n                    <div style=\"font-size:10.5px;color:#9aa4b2;margin-top:3px\">{{ u.src }}<\u002Fdiv>\n                  <\u002Fdiv>\n                <\u002Fdiv>\n              <\u002Fsc-for>\n            <\u002Fdiv>\n          <\u002Fsection>\n        <\u002Fdiv>\n        <div style=\"margin-top:16px;background:#eef4ff;border:1px solid #d4e2fb;border-radius:11px;padding:13px 16px;font-size:12px;color:#3a4f7a;line-height:1.55\"><span style=\"font-weight:700\">En service : <\u002Fspan>le moteur d'actualisation interroge automatiquement CDC, OMS, ECDC, Africa CDC et ESCMID Epi Alert chaque jour à 6h, et ne publie un chiffre que s'il est plus récent que celui déjà affiché. Le bouton ↻ de la barre latérale relit simplement la dernière publication — il ne déclenche pas une nouvelle vérification web (ce n'est pas possible depuis une page statique).<\u002Fdiv>\n      <\u002Fdiv>\n      <\u002Fsc-if>\n\n      <!-- ═══ AUTRES VUES (placeholder) ═══ -->\n      <sc-if value=\"{{ isOther }}\">\n      <div style=\"display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:70px 20px;background:#fff;border:1px dashed #d4dae2;border-radius:14px\">\n        <div style=\"width:52px;height:52px;border-radius:13px;background:#eef2f7;display:flex;align-items:center;justify-content:center;font-size:22px;color:#8a93a1;margin-bottom:16px\">{{ otherIcon }}<\u002Fdiv>\n        <div style=\"font-size:17px;font-weight:700;margin-bottom:6px\">{{ pageTitle }}<\u002Fdiv>\n        <div style=\"font-size:13px;color:#79828f;max-width:430px;line-height:1.55\">Cette vue est déjà construite dans ton prototype (carte D3, heatmap, courbes, synthèse, journal). On la reprend telle quelle dans la piste B — seul l'habillage change pour coller au tableau de bord.<\u002Fdiv>\n        <div style=\"margin-top:18px;font-size:12px;color:#2d6df0;font-weight:600;background:#eef4ff;border:1px solid #d4e2fb;padding:7px 14px;border-radius:8px\">Maquette à détailler si on valide la piste B<\u002Fdiv>\n      <\u002Fdiv>\n      <\u002Fsc-if>\n\n    <\u002Fdiv>\n\n    <!-- ═══ FICHE PAYS (clic carte) ═══ -->\n    <sc-if value=\"{{ hasDetail }}\">\n    <div onclick=\"{{ onCloseDetail }}\" style=\"position:absolute;inset:0;background:rgba(20,30,50,.28);z-index:40\"><\u002Fdiv>\n    <div style=\"position:absolute;top:0;right:0;height:100%;width:380px;max-width:90vw;background:#fff;box-shadow:-8px 0 30px rgba(20,30,50,.16);z-index:41;display:flex;flex-direction:column\">\n      <div style=\"padding:16px 18px;border-bottom:1px solid #eef1f5;display:flex;align-items:flex-start;justif \u002Fdiv>\n\n        <div style=\"background:#fdf6e3;border:1px solid #ecdca5;border-radius:10px;padding:11px 13px;font-size:11.5px;color:#8a6312;line-height:1.55\"><span style=\"font-weight:700\">Note : <\u002Fspan>{{ detail.note }}<\u002Fdiv>\n        <sc-if value=\"{{ detail.hasCat }}\" hint-placeholder-val=\"{{ detail.hasCat }}\">\n          <div onclick=\"{{ detail.onToggleCat }}\" style=\"margin-top:14px;display:flex;align-items:center;justify-content:space-between;gap:8px;background:#eef4ff;border:1px solid #d6e3f5;border-radius:9px;padding:10px 13px;cursor:pointer\">\n            <span style=\"font-size:11.5px;font-weight:700;color:#2c4f9e\">Conduite à tenir (COREB)<\u002Fspan>\n            <sc-if value=\"{{ detail.catClosed }}\" hint-placeholder-val=\"{{ detail.catClosed }}\"><span style=\"font-size:11px;color:#2c4f9e\">Afficher ▾<\u002Fspan><\u002Fsc-if>\n            <sc-if value=\"{{ detail.catOpen }}\"><span style=\"font-size:11px;color:#2c4f9e\">Masquer ▴<\u002Fspan><\u002Fsc-if>\n          <\u002Fdiv>\n          <sc-if value=\"{{ detail.catOpen }}\">\n            <div style=\"margin-top:8px;border:1px solid #d6e3f5;border-radius:11px;overflow:hidden\">\n              <div style=\"background:#eef4ff;padding:7px 13px;text-align:right\"><span style=\"font-size:10px;color:#7d93c0\">{{ detail.catSrc }}<\u002Fspan><\u002Fdiv>\n              <div style=\"padding:4px 13px 9px\">\n                <sc-for list=\"{{ detail.cat }}\" as=\"c\" hint-placeholder-count=\"4\">\n                  <div style=\"padding:8px 0;border-bottom:1px solid #f1f4f8\">\n                    <div style=\"font-size:11px;font-weight:700;color:#2c4f9e;margin-bottom:2px\">{{ c.k }}<\u002Fdiv>\n                    <div style=\"font-size:11.5px;color:#3c4757;line-height:1.5\">{{ c.v }}<\u002Fdiv>\n                  <\u002Fdiv>\n                <\u002Fsc-for>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fsc-if>\n        <\u002Fsc-if>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <\u002Fsc-if>\n\n  <\u002Fmain>\n<\u002Fdiv>\n\n<!-- ═══ BULLETIN IMPRIMABLE (PDF) ═══ -->\n<div id=\"bulletin\" style=\"font-family:'Public Sans',system-ui,sans-serif;color:#1b2330;background:#fff;padding:0\">\n  <div style=\"display:flex;align-items:center;justify-content:space-between;gap:16px;border-bottom:2px solid #141a26;padding-bottom:14px;margin-bottom:20px\">\n    <div style=\"display:flex;align-items:center;gap:12px\">\n      <div style=\"width:34px;height:34px;border-radius:8px;background:#2d6df0;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:16px;color:#fff\">R<\u002Fdiv>\n      <div>\n        <div style=\"font-size:10px;letter-spacing:.09em;text-transform:uppercase;color:#79828f\">REB RUN — La Réunion · COREB<\u002Fdiv>\n        <div style=\"font-size:18px;font-weight:800;letter-spacing:-.01em\">Bulletin de veille REB — Océan Indien<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"text-align:right;font-size:11px;color:#79828f;line-height:1.6\">{{ bulletin.dateLong }}<br><span style=\"color:#b32525;font-weight:700\">Risque global : URGENCE<\u002Fspan><\u002Fdiv>\n  <\u002Fdiv>\n\n  <div style=\"font-size:13px;font-weight:700;color:#46505f;text-transform:uppercase;letter-spacing:.05em;margin-bottom:10px\">Foyers actifs &amp; pathogènes suivis<\u002Fdiv>\n  <div style=\"font-size:12px;margin-bottom:20px\">\n    <div style=\"display:grid;grid-template-columns:160px 110px 1fr 160px;background:#f6f8fa\">\n      <div style=\"text-align:left;padding:8px 10px;border-bottom:1.5px solid #e6eaf0;font-weight:700;color:#46505f\">Pathogène<\u002Fdiv>\n      <div style=\"text-align:left;padding:8px 10px;border-bottom:1.5px solid #e6eaf0;font-weight:700;color:#46505f\">Niveau<\u002Fdiv>\n      <div style=\"text-align:left;padding:8px 10px;border-bottom:1.5px solid #e6eaf0;font-weight:700;color:#46505f\">Zones &amp; chiffres<\u002Fdiv>\n      <div style=\"text-align:left;padding:8px 10px;border-bottom:1.5px solid #e6eaf0;font-weight:700;color:#46505f\">Période<\u002Fdiv>\n    <\u002Fdiv>\n    <sc-for list=\"{{ alerts }}\" as=\"a\" hint-placeholder-count=\"7\">\n      <div style=\"display:grid;grid-template-columns:160px 110px 1fr 160px;break-inside:avoid\">\n        <div style=\"padding:8px 10px;border-bottom:1px solid #f1f4f8;font-weight:700;color:#1b2330\">{{ a.name }}<div style=\"font-size:10px;font-weight:400;color:#8a93a1;margin-top:2px\">{{ a.group }}<\u002Fdiv><\u002Fdiv>\n        <div style=\"padding:8px 10px;border-bottom:1px solid #f1f4f8\"><span style=\"{{ a.badgeStyle }}\">{{ a.badgeLabel }}<\u002Fspan><\u002Fdiv>\n        <div style=\"padding:8px 10px;border-bottom:1px solid #f1f4f8\">\n          <sc-for list=\"{{ a.zones }}\" as=\"z\" hint-placeholder-count=\"2\">\n            <div style=\"font-size:11.5px;color:#3c4757;margin-bottom:2px\"><span style=\"font-weight:600\">{{ z.zone }}<\u002Fspan> · {{ z.stat }}<\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n        <div style=\"padding:8px 10px;border-bottom:1px solid #f1f4f8;font-size:10.5px;color:#79828f\">{{ a.period }}<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsc-for>\n  <\u002Fdiv>\n\n  <div style=\"font-size:13px;font-weight:700;color:#46505f;text-transform:uppercase;letter-spacing:.05em;margin-bottom:10px\">Faits marquants<\u002Fdiv>\n  <div style=\"margin-bottom:20px\">\n    <sc-for list=\"{{ journal }}\" as=\"j\" hint-placeholder-count=\"3\">\n      <div style=\"padding:9px 0;border-bottom:1px solid #f1f4f8;break-inside:avoid\">\n        <div style=\"display:flex;align-items:center;gap:8px;margin-bottom:3px\">\n          <span style=\"width:8px;height:8px;border-radius:50%;background:{{ j.dot }};flex-shrink:0\"><\u002Fspan>\n          <span style=\"font-size:12px;font-weight:700\">{{ j.path }}<\u002Fspan>\n          <span style=\"font-size:10px;color:#9aa4b2\">{{ j.meta }}<\u002Fspan>\n        <\u002Fdiv>\n        <div style=\"font-size:11.5px;color:#3c4757;line-height:1.5;padding-left:16px\">{{ j.text }}<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsc-for>\n  <\u002Fdiv>\n\n  <div style=\"font-size:10px;color:#9aa4b2;line-height:1.6;border-top:1px solid #eef1f5;padding-top:12px\">\n    Sources : OMS (Disease Outbreak News), ECDC, CDC, Africa CDC, Santé publique France, ARS Océan Indien, ministères de la Santé concernés. Chiffres indicatifs arrêtés à la date des derniers bilans disponibles. Document interne REB RUN — service d'infectiologie / COREB.\n  <\u002Fdiv>\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\">\nclass Component extends DCLogic {\n  state = { view: 'accueil', refreshState: 'idle' };\n\n  componentDidMount() {\n    this._onResize = () => { this._mapKey = null; this.scheduleDraw(); };\n    window.addEventListener('resize', this._onResize);\n    this.scheduleDraw();\n    // Étape 2 : charger les chiffres depuis le fichier de données externe (repli sur valeurs intégrées si absent)\n    this.loadData();\n  }\n  componentWillUnmount() {\n    window.removeEventListener('resize', this._onResize);\n  }\n  componentDidUpdate() { this.scheduleDraw(); }\n\n  // Recharge donnees.json — c'est le fichier que le moteur d'actualisation (GitHub Actions,\n  // 1×/jour) tient à jour. Ce bouton ne relance PAS une vérification web en direct (impossible\n  // depuis une page statique, et bloqué par CORS pour plusieurs sources) — il relit simplement\n  // la dernière version publiée, utile si la page est restée ouverte depuis avant le run du jour.\n  loadData(manual) {\n    if (manual) this.setState({ refreshState: 'loading' });\n    return fetch('donnees.json', { cache: 'no-store' })\n      .then(r => r.ok ? r.json() : null)\n      .then(d => {\n        if (d) this.setState({ data: d, refreshState: manual ? 'done' : 'idle' });\n        else if (manual) this.setState({ refreshState: 'error' });\n        if (manual) setTimeout(() => this.setState({ refreshState: 'idle' }), 2500);\n      })\n      .catch(() => { if (manual) { this.setState({ refreshState: 'error' }); setTimeout(() => this.setState({ refreshState: 'idle' }), 2500); } });\n  }\n\n  scheduleDraw() {\n    clearTimeout(this._drawT);\n    this._drawT = setTimeout(() => this.drawMap(), 60);\n  }\n\n  onPick(name, mode, isIsland) {\n    this.setState({ sel: { name, mode, isIsland } });\n  }\n\n  async waitLibs() {\n    for (let i = 0; i < 120; i++) {\n      if (window.d3 && window.topojson) return true;\n      await new Promise(r => setTimeout(r, 80));\n    }\n    return !!(window.d3 && window.topojson);\n  }\n\n  async ensureTopo() {\n    if (this._topoFeat) return this._topoFeat;\n    if (this._topoLoading) return this._topoLoading;\n    this._topoLoading = (async () => {\n      const KEY = 'reb_world_topo_110m';\n      let raw = null;\n      try { raw = localStorage.getItem(KEY); } catch (e) {}\n      if (!raw) {\n        const r = await fetch('https://cdn.jsdelivr.net/npm/world-atlas@2/countries-110m.json');\n        raw = await r.text();\n        try { localStorage.setItem(KEY, raw); } catch (e) {}\n      }\n      const topo = JSON.parse(raw);\n      this._topoFeat = window.topojson.feature(topo, topo.objects.countries);\n      return this._topoFeat;\n    })();\n    return this._topoLoading;\n  }\n\n  async drawMap() {\n    const elR = document.getElementById('reb-map-regional');\n    const elW = document.getElementById('reb-map-world');\n    const el = elR || elW;\n    if (!el) return;\n    const mode = elR ? 'regional' : 'world';\n    const patho = this.state.mapPatho || 'ebola_bdb';\n    const key = mode + '|' + patho + '|' + el.clientWidth + '|' + el.clientHeight;\n    if (this._mapKey === key && el.querySelector('svg')) return;\n    const ok = await this.waitLibs();\n    if (!ok) return;\n    let feat;\n    try { feat = await this.ensureTopo(); } catch (e) { return; }\n    const cur = document.getElementById(mode === 'regional' ? 'reb-map-regional' : 'reb-map-world');\n    if (!cur) return;\n    this._mapKey = key;\n    this.renderMap(cur, feat, mode, patho);\n  }\n\n  renderMap(el, feat, mode, patho) {\n    const d3 = window.d3;\n    const W = el.clientWidth || 800, H = el.clientHeight || 440;\n    const ld = el.querySelector('.reb-map-loading'); if (ld) ld.style.display = 'none';\n    d3.select(el).selectAll('svg').remove();\n    const svg = d3.select(el).append('svg')\n      .attr('width', W).attr('height', H)\n      .style('display', 'block').style('position', 'absolute').style('inset', '0');\n\n    // Palettes\n    const FILL = { 0:'#eef1f5', 1:'#fdf3d6', 2:'#fce8d8', 3:'#fbe3e3', 4:'#fbe3e3' };\n    const STROKE = { 0:'#dfe5ec', 1:'#e3c873', 2:'#e6ac7e', 3:'#e09a9a', 4:'#e09a9a' };\n    const DOT = { 0:'#cdd4de', 1:'#d8a72b', 2:'#e2853a', 3:'#e2853a', 4:'#d4453f' };\n\n    // Niveaux régionaux (alerte courante) — noms anglais topo -> niveau\n    const HM = (this.HM && this.HM[patho]) || {};\n    const EN2LV = {\n      'Dem. Rep. Congo': HM['RDC'], 'Uganda': HM['Ouganda'], 'Tanzania': HM['Tanzanie'],\n      'Mozambique': HM['Mozambique'], 'Madagascar': HM['Madagascar'],\n    };\n    // Diffusion mondiale (indicative) par pathogène\n    const GW = (this.GLOBAL && this.GLOBAL[patho]) || {};\n\n    const proj = mode === 'regional'\n      ? d3.geoMercator().fitExtent([[16,16],[W-16,H-16]], { type:'MultiPoint', coordinates:[[10,13],[63,-27]] })\n      : d3.geoNaturalEarth1().fitExtent([[4,6],[W-4,H-6]], { type:'Sphere' });\n    const path = d3.geoPath(proj);\n\n    const root = svg.append('g');\n    if (mode === 'world') {\n      root.append('path').datum({ type:'Sphere' }).attr('d', path)\n        .attr('fill', '#eaf2f9').attr('stroke', '#d4e0ec');\n    }\n\n    const lvlOf = d => mode === 'regional' ? EN2LV[d.properties.name] : GW[d.properties.name];\n    const frName = n => (this.EN_FR && this.EN_FR[n]) || n;\n    // Carte mondiale : niveau 1 = cas sporadique/importé (signal ponctuel) → fond très pâle + marqueur,\n    // niveaux 2-3 = circulation de zone → aplat plein.\n    const worldFill = (lv) => lv === 1 ? '#fbf4e0' : FILL[lv];\n    const countries = root.append('g').selectAll('path').data(feat.features).join('path')\n      .attr('d', path)\n      .attr('fill', d => { const lv = lvlOf(d); return lv ? (mode === 'world' ? worldFill(lv) : FILL[lv]) : (mode === 'world' ? '#dde6ef' : '#e6edf3'); })\n      .attr('stroke', d => { const lv = lvlOf(d); return lv ? STROKE[lv] : '#cdd8e2'; })\n      .attr('stroke-width', d => { const lv = lvlOf(d); return lv ? 1 : 0.5; })\n      .attr('vector-effect', 'non-scaling-stroke')\n      .style('cursor', 'pointer')\n      .on('mouseover', function(){ d3.select(this).attr('stroke', '#2d6df0').attr('stroke-width', 1.4).raise(); })\n      .on('mouseout', function(event, d){ const lv = lvlOf(d); d3.select(this).attr('stroke', lv ? STROKE[lv] : '#cdd8e2').attr('stroke-width', lv ? 1 : 0.5); })\n      .on('click', (event, d) => { this.onPick(d.properties.name, mode, false); });\n    countries.append('title').text(d => { const lv = lvlOf(d); const sfx = (mode === 'world' && lv === 1) ? ' — cas sporadique / importé' : ''; return frName(d.properties.name) + sfx; });\n\n    // Marqueurs « signal ponctuel » pour les cas sporadiques/importés (carte mondiale, niveau 1)\n    if (mode === 'world') {\n      const spor = feat.features.filter(d => GW[d.properties.name] === 1);\n      const mg = root.append('g').style('pointer-events', 'none');\n      spor.forEach(d => {\n        let c; try { c = path.centroid(d); } catch (e) { return; }\n        if (!c || isNaN(c[0]) || isNaN(c[1])) return;\n        const g = mg.append('g').attr('transform', `translate(${c[0]},${c[1]})`);\n        g.append('circle').attr('r', 4.5).attr('fill', 'none').attr('stroke', '#d8a72b').attr('stroke-width', 1.6).attr('vector-effect', 'non-scaling-stroke');\n        g.append('circle').attr('r', 1.4).attr('fill', '#d8a72b');\n      });\n    }\n\n    // Zoom molette (carte mondiale)\n    if (mode === 'world') {\n      const zoom = d3.zoom().scaleExtent([1, 8])\n        .on('zoom', (event) => { root.attr('transform', event.transform); });\n      svg.call(zoom).on('dblclick.zoom', null);\n      svg.on('dblclick', () => svg.transition().duration(400).call(zoom.transform, d3.zoomIdentity));\n    }\n\n    // Marqueurs îles (régional uniquement)\n    if (mode === 'regional') {\n      const ISL = [\n        { z:'Comores', c:[43.3,-11.7] }, { z:'Mayotte', c:[45.17,-12.83] },\n        { z:'Seychelles', c:[55.5,-4.6] }, { z:'Maurice', c:[57.5,-20.3] },\n        { z:'La Réunion', c:[55.5,-21.1] },\n      ];\n      const g = svg.append('g');\n      ISL.forEach(({ z, c }) => {\n        const p = proj(c); if (!p) return;\n        const lv = HM[z] || 0;\n        const node = g.append('g').attr('transform', `translate(${p[0]},${p[1]})`).style('cursor', 'pointer')\n          .on('click', () => this.onPick(z, 'regional', true));\n        node.append('circle').attr('r', 9).attr('fill', '#fff').attr('stroke', DOT[lv]).attr('stroke-width', 2.5)\n          .append('title').text(`${z} — niveau ${lv}`);\n        node.append('circle').attr('r', 5).attr('fill', DOT[lv]).style('pointer-events', 'none');\n        node.append('text').attr('x', 13).attr('y', 4).attr('font-size', '10.5px').attr('font-weight', '600')\n          .attr('fill', '#3c4757').style('pointer-events', 'none')\n          .text(z === 'La Réunion' ? 'La Réunion' : z)\n          .clone(true).lower().attr('stroke', 'rgba(255,255,255,.85)').attr('stroke-width', 3);\n      });\n    }\n  }\n\n  renderVals() {\n    const D = this.state.data || {};\n    const A = {\n      1:{label:'Surveillance',     bg:'#e7f4ea',border:'#9ccba8',text:'#2c7a44',dot:'#3f9e57'},\n      2:{label:'Veille renforcée', bg:'#fdf3d6',border:'#e3c873',text:'#8a6312',dot:'#d8a72b'},\n      3:{label:'Alerte',           bg:'#fce8d8',border:'#e6ac7e',text:'#a85a1c',dot:'#e2853a'},\n      4:{label:'Urgence',          bg:'#fbe3e3',border:'#e09a9a',text:'#b32525',dot:'#d4453f'},\n    };\n    A[0] = {label:'Aucun signal', bg:'#f1f4f8', border:'#dbe1ea', text:'#8a93a1', dot:'#cdd4de'};\n    const badge = lvl => `background:${A[lvl].bg};color:${A[lvl].text};border:1px solid ${A[lvl].border};font-size:11px;font-weight:700;padding:3px 10px;border-radius:6px;white-space:nowrap`;\n    const stat = (cas,dec) => cas==null ? 'circulation active' : (dec!=null ? `${cas.toLocaleString('fr-FR')} cas · ${dec} décès` : `${cas.toLocaleString('fr-FR')} cas`);\n\n    // ── Fraîcheur des données (aujourd'hui = 28/06/2026) ──\n    const TODAY = new Date(2026, 5, 28);\n    const freshness = (dateStr) => {\n      const m = /^(\\d{2})\\/(\\d{2})\\/(\\d{4})$/.exec(dateStr || '');\n      if (!m) return { label:'cadence saisonnière', age:null, dot:'#cdd4de', bg:'#f1f4f8', text:'#79828f', border:'#dbe1ea' };\n      const d = new Date(+m[3], +m[2]-1, +m[1]);\n      const age = Math.round((TODAY - d) / 86400000);\n      const ago = age <= 0 ? \"aujourd'hui\" : age === 1 ? 'hier' : `il y a ${age} j`;\n      if (age <= 10) return { label:`à jour · ${ago}`, age, dot:'#3f9e57', bg:'#e7f4ea', text:'#2c7a44', border:'#9ccba8' };\n      if (age <= 30) return { label:`à vérifier · ${ago}`, age, dot:'#d8a72b', bg:'#fdf3d6', text:'#8a6312', border:'#e3c873' };\n      return { label:`à réactualiser · ${ago}`, age, dot:'#d4453f', bg:'#fce8d8', text:'#a85a1c', border:'#e6ac7e' };\n    };\n    const freshPill = (f) => `display:inline-flex;align-items:center;gap:5px;background:${f.bg};color:${f.text};border:1px solid ${f.border};font-size:10.5px;font-weight:600;padding:3px 9px;border-radius:20px;white-space:nowrap`;\n\n    const rawAlerts = D.alerts || [\n      {name:'Ebola Bundibugyo', group:'Fièvre hémorragique virale', lvl:4, period:'cumul depuis le début de l\\u2019épidémie (déclarée 17/05) · arrêté au 24/06/2026',\n        zones:[{zone:'RDC',l:4,cas:1155,dec:304},{zone:'Ouganda',l:4,cas:19,dec:2}]},\n      {name:'Mpox (clade Ib)', group:'Orthopoxvirose', lvl:3, period:'cumul depuis le début de l\\u2019épidémie · arrêté au 12/06/2026',\n        zones:[{zone:'Madagascar',l:3,cas:2049,dec:7}]},\n      {name:'Choléra', group:'Maladie entérique', lvl:2, period:'cumul depuis le début de l\\u2019épisode · arrêté au 21/02/2026',\n        zones:[{zone:'Comores',l:2,cas:105,dec:6}]},\n      {name:'Dengue', group:'Arbovirose', lvl:2, period:'saison 2026 · circulation en cours (pas de comptage cumulé)',\n        zones:[{zone:'La Réunion',l:2,cas:null},{zone:'Mayotte',l:2,cas:null},{zone:'Madagascar',l:2,cas:null}]},\n      {name:'Leptospirose', group:'Zoonose', lvl:2, period:'endémique · pic saisonnier janv.–avr. 2026',\n        zones:[{zone:'La Réunion',l:2,cas:null}]},\n      {name:'Peste', group:'Zoonose', lvl:2, period:'endémique · cas sporadiques saison 2026',\n        zones:[{zone:'Madagascar',l:2,cas:null}]},\n      {name:'Chikungunya', group:'Arbovirose', lvl:1, period:'endémique Océan Indien · surveillance vectorielle continue',\n        zones:[{zone:'La Réunion',l:1,cas:null},{zone:'Mayotte',l:1,cas:null}]},\n    ];\n    const alerts = rawAlerts.map(a => ({\n      name:a.name, group:a.group, period:a.period,\n      badgeStyle:badge(a.lvl), badgeLabel:A[a.lvl].label,\n      zones:a.zones.map(z => ({ zone:z.zone, dot:A[z.l].dot, stat:stat(z.cas,z.dec) })),\n    }));\n\n    const rawJournal = D.journal || [\n      {date:'25/06', l:4, path:'Ebola Bundibugyo', src:'ECDC', text:\"RDC : 1 155 cas confirmés et 304 décès (Ituri 1 054, Nord-Kivu 98, Sud-Kivu 3). Cas importé confirmé en France le 24/06 (évacuation sanitaire depuis la zone d'épidémie) — vigilance renforcée aux points d'entrée.\"},\n      {date:'01/06', l:4, path:'Ebola Bundibugyo', src:'OMS DON', text:\"Confirmation de l'épidémie en RDC (Nord-Kivu). Transmission transfrontalière vers l'Ouganda confirmée. Préparation activée au CHU.\"},\n      {date:'28/05', l:3, path:'Mpox', src:'ECDC', text:\"Augmentation des cas clade Ib en RDC, extension documentée vers l'Ouganda. Vigilance renforcée aux points d'entrée.\"},\n      {date:'22
